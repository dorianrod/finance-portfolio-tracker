[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "finance-dashboard"
version = "1.0.0"
description = "Local launcher for the pre-built finance dashboard"
requires-python = ">=3.10"

[project.scripts]
finance-dashboard = "finance_dashboard.cli:main"

[tool.hatch.build.hooks.custom]

[tool.hatch.build.targets.wheel]
packages = ["finance_dashboard"]

[tool.hatch.build.targets.wheel.force-include]
"dist" = "finance_dashboard/dist"
